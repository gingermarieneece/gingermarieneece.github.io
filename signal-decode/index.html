<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signal Decode</title>
  <style>
    :root {
      --bg: #eef6ff;
      --surface: rgba(255,255,255,0.92);
      --text: #122033;
      --muted: rgba(18,32,51,0.68);
      --blue: #2c7df0;
      --cyan: #19b8ff;
      --line: rgba(18,32,51,0.08);
      --shadow: 0 20px 44px rgba(18,32,51,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(44,125,240,0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(25,184,255,0.18), transparent 24%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 34px 30px;
    }
    .eyebrow {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 64px);
      line-height: 0.95;
    }
    .gradient {
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p {
      margin: 16px 0 0;
      max-width: 58ch;
      font-size: 17px;
      line-height: 1.65;
      color: var(--muted);
    }
    .links {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a {
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
    }
    a.primary {
      color: white;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-color: transparent;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Signal Decode</p>
    <h1><span class="gradient">Read the room</span><br>before you reply</h1>
    <p>Signal Decode helps you paste a message, decode the vibe, and get a grounded next move. This site hosts the public privacy, terms, and support links for the app.</p>
    <div class="links">
      <a class="primary" href="/signal-decode/privacy/">Privacy Policy</a>
      <a href="/signal-decode/terms/">Terms</a>
      <a href="/signal-decode/support/">Support</a>
    </div>
  </main>
</body>
</html>
