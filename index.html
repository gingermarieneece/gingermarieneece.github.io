<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ginger Neece</title>
  <style>
    :root {
      --bg: #fff9f7;
      --text: #1e1b1a;
      --muted: rgba(30, 27, 26, 0.7);
      --coral: #e65a57;
      --electric: #ff5aa8;
      --surface: rgba(255,255,255,0.9);
      --line: rgba(30,27,26,0.08);
      --shadow: 0 18px 40px rgba(30,27,26,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(243,214,207,0.85), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255,90,168,0.12), transparent 28%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 64px);
      line-height: 0.95;
    }

    .gradient {
      background: linear-gradient(90deg, var(--coral), var(--electric));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin: 16px 0 0;
      font-size: 17px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 56ch;
    }

    .links {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
    }

    a.primary {
      color: white;
      background: linear-gradient(90deg, var(--coral), var(--electric));
      border-color: transparent;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Ginger Neece</p>
    <h1><span class="gradient">Mindset</span><br>Privacy and App Links</h1>
    <p>This site hosts the public privacy information and support-facing links for Mindset.</p>
    <div class="links">
      <a class="primary" href="/privacy/">Privacy Policy</a>
      <a href="https://apps.apple.com/app/id6758931458">App Store</a>
    </div>
  </main>
</body>
</html>
